<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benjamin Gaming</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#050505;
    color:white;
    overflow-x:hidden;
    padding-bottom:90px;
}

/* Background Glow */

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(196,240,0,0.15), transparent 35%),
    radial-gradient(circle at 80% 30%, rgba(196,240,0,0.12), transparent 35%),
    radial-gradient(circle at 50% 80%, rgba(196,240,0,0.12), transparent 35%);
    z-index:-1;
}

/* Header */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#0B0B0B;
    border-bottom:1px solid #222;
    position:sticky;
    top:0;
    z-index:100;
}

.menu{
    font-size:28px;
}

.logo{
    color:#C4F000;
    font-size:22px;
    font-weight:bold;
}

.wallet{
    background:#161616;
    padding:10px 15px;
    border-radius:15px;
}

.deposit{
    background:#C4F000;
    color:black;
    border:none;
    padding:10px 18px;
    border-radius:15px;
    font-weight:bold;
}

/* Banner */

.banner{
    margin:15px;
    padding:25px;
    background:linear-gradient(135deg,#111,#1b1b1b);
    border-radius:25px;
    border:1px solid #222;
}

.banner h1{
    color:#C4F000;
    font-size:34px;
}

.banner p{
    color:#bdbdbd;
    margin-top:10px;
    margin-bottom:20px;
}

.play-btn{
    background:#C4F000;
    color:black;
    border:none;
    padding:14px 25px;
    border-radius:15px;
    font-weight:bold;
}

/* Cards */

.title{
    margin:20px 15px;
    font-size:24px;
}

.scroll{
    display:flex;
    overflow:auto;
    gap:15px;
    padding:0 15px;
}

.card{
    min-width:160px;
    background:#111;
    border-radius:20px;
    padding:20px;
    border:1px solid #222;
}

.card img{
    width:100%;
    border-radius:15px;
}

.amount{
    color:#C4F000;
    font-size:24px;
    font-weight:bold;
    margin-top:10px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:15px;
}

.category{
    background:#111;
    border-radius:25px;
    text-align:center;
    padding:35px 20px;
    border:1px solid #222;
    font-size:22px;
}

.category:hover{
    border-color:#C4F000;
}

/* Bottom Navigation */

.bottom{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#0B0B0B;
    display:flex;
    justify-content:space-around;
    padding:15px 0;
    border-top:1px solid #222;
}

.bottom a{
    color:white;
    text-decoration:none;
    text-align:center;
    font-size:13px;
}

/* Mobile */

@media(max-width:768px){
    .logo{
        font-size:18px;
    }

    .banner h1{
        font-size:28px;
    }
}

</style>
</head>

<body>

<div class="header">
    <div class="menu">☰</div>
    <div class="logo">BENJAMIN</div>
    <div class="wallet">₹0</div>
    <button class="deposit">Deposit</button>
</div>

<div class="banner">
    <h1>WELCOME BONUS</h1>
    <p>Premium Gaming Experience</p>
    <button class="play-btn">PLAY NOW</button>
</div>

<h2 class="title">🏆 Recent Winners</h2>

<div class="scroll">

    <div class="card">
        <img src="https://picsum.photos/200/120?1">
        <div class="amount">₹84K</div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/200/120?2">
        <div class="amount">₹403K</div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/200/120?3">
        <div class="amount">₹92K</div>
    </div>

</div>

<h2 class="title">🔥 Categories</h2>

<div class="grid">

    <div class="category">
        🎰<br><br>Casino
    </div>

    <div class="category">
        ⚽<br><br>Sports
    </div>

    <div class="category">
        📈<br><br>Prediction
    </div>

    <div class="category">
        💰<br><br>Wallet
    </div>

</div>

<h2 class="title">🎮 Popular Games</h2>

<div class="grid">

    <div class="category">🎲 Dice</div>
    <div class="category">💣 Mines</div>
    <div class="category">📈 Crash</div>
    <div class="category">🎡 Roulette</div>

</div>

<div class="bottom">

    <a href="index.html">🏠<br>Home</a>
    <a href="casino.html">🎰<br>Casino</a>
    <a href="sports.html">⚽<br>Sports</a>
    <a href="wallet.html">💰<br>Wallet</a>
    <a href="login.html">👤<br>Profile</a>

</div>

</body>
</html>
